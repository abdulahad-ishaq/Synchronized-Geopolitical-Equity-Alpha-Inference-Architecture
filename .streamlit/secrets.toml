# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────────────
# Copy this file to  .streamlit/secrets.toml  for local Streamlit testing.
# On Streamlit Cloud, paste these values into Settings → Secrets (do NOT
# commit this file to a public repo).
# ─────────────────────────────────────────────────────────────────────────

NEWSAPI_KEY  = "YOUR_NEWSAPI_KEY_HERE"    # https://newsapi.org  (free tier)
FRED_API_KEY = "YOUR_FRED_API_KEY_HERE"   # https://fred.stlouisfed.org (optional)
